services:
  - type: web
    name: spectrax-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: ./backend
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spectrax-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spectrax-redis
          type: redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false

  - type: web
    name: spectrax-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: starter
    envVars:
      - key: VITE_API_URL
        fromService:
          name: spectrax-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: spectrax-db
    databaseName: spectrax_db
    user: spectrax
    plan: starter

  - name: spectrax-redis
    type: redis
    plan: starter
